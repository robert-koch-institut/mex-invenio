name: Testing

on:
  push:
    branches: ["main"]
    tags: ["**"]
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:

env:
  PIP_DISABLE_PIP_VERSION_CHECK: on
  PIP_NO_CLEAN: on
  PIP_NO_INPUT: on
  PIP_PREFER_BINARY: on
  PIPENV_VENV_IN_PROJECT: "1"
  PY_COLORS: "1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    env:
      INVENIO_INSTANCE_PATH: ${{ github.workspace }}
      MEX_IMPORT_BUCKET: placeholder
      MEX_IMPORT_AWS_KEY_ID: placeholder
      MEX_IMPORT_AWS_SECRET: placeholder
      MEX_IMPORT_EMAIL: placeholder

    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Cache requirements
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        env:
          cache-name: cache-requirements
        with:
          path: ~/.cache/pip
          key: ${{ env.cache-name }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ env.cache-name }}-

      - name: Cache environment
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        env:
          cache-name: cache-environment
        with:
          path: ~/.cache/pipenv
          key: ${{ env.cache-name }}-${{ hashFiles('*.lock') }}
          restore-keys: |
            ${{ env.cache-name }}-

      - name: Setup system
        run: |
          sudo apt-get update && sudo apt-get install -y fonts-dejavu \
            imagemagick libbz2-dev libcairo2-dev libffi-dev liblzma-dev libpq-dev \
            libsqlite3-dev libssl-dev libxml2-dev libxmlsec1-dev libxslt1-dev locales

      - name: Setup python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.11

      - name: Setup node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 16

      - name: Install requirements
        run: make install

      - name: Run test suite
        run: |
          eval "$(pipenv run docker-services-cli up --db postgresql --search opensearch2 --cache redis --mq rabbitmq --env)"
          pipenv run python -m pytest -W ignore

      - name: Cleanup containers
        if: always()
        run: pipenv run docker-services-cli down
