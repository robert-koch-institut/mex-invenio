name: Testing

on:
  push:
    branches: ["main"]
    tags: ["**"]
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:

env:
  PIP_DISABLE_PIP_VERSION_CHECK: on
  PIP_NO_CLEAN: on
  PIP_NO_INPUT: on
  PIP_PREFER_BINARY: on
  PY_COLORS: "1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: registry.cern.ch/inveniosoftware/almalinux:1
    env:
      INVENIO_INSTANCE_PATH: ${{ github.workspace }}
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Cache requirements
        uses: actions/cache@v4
        env:
          cache-name: cache-requirements
        with:
          path: ~/.cache/pip
          key: ${{ env.cache-name }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ env.cache-name }}-

      - name: Cache environment
        uses: actions/cache@v4
        env:
          cache-name: cache-environment
        with:
          path: ~/.cache/pipenv
          key: ${{ env.cache-name }}-${{ hashFiles('*.lock') }}
          restore-keys: |
            ${{ env.cache-name }}-

      - name: Setup python
        run: |
          dnf -y install python3.11 python3.11-devel python3.11-libs python3.11-pip
          alternatives --install /usr/bin/python3 python3 /usr/bin/python3.11 1
          alternatives --set python3 /usr/bin/python3.11

      - name: Install requirements
        run: make install

      - name: Start services
        run: pipenv run docker-services-cli up --db postgresql --search opensearch2 --cache redis --mq rabbitmq

      - name: Run test suite
        run: |
          eval "$(pipenv run docker-services-cli up --db postgresql --search opensearch2 --cache redis --mq rabbitmq --env)"
          pipenv run python -m pytest -W ignore

      - name: Stop services
        if: always()
        run: pipenv run docker-services-cli down
