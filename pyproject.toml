[tool.pytest.ini_options]
addopts = [
    "--verbose",
    "--cov",
    "--no-cov-on-fail",
    "--cov-report=term-missing:skip-covered",
    "--cov-fail-under=65",
    "--cov-branch",
    "--pdbcls=IPython.terminal.debugger:TerminalPdb",
]

[tool.ruff]
fix = true
line-length = 88
show-fixes = true

[tool.ruff.format]
docstring-code-format = true

[tool.ruff.lint.per-file-ignores]
"tests/**" = [
    "F841",     # Allow unused local variable assignment in tests
]
"site/mex_invenio/config/settings.py" = [
    "F401",     # Allow unused imports (re-exported for Invenio config)
]

[tool.ruff.lint.isort]
known-first-party = ["mex_invenio", "tests"]

[tool.ruff.lint.pydocstyle]
convention = "google"
