{%- extends config.BASE_TEMPLATE %}

{% block page_body %}
    <style>
        .biblo-resource-card {
            display: flex;
            padding: 15px 10px 10px 10px;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            gap: 15px;
            align-self: stretch;
            background: #FFF;
            margin:10px 0px;
        }
    </style>

    <div id="search-page" class="ui container search_page">
        <section class="banner banner-bibliographicresource">
            <small>{{ _("searchOur") }}</small>
            <h1>{{ _('Publications') }}</h1>
        </section>
        {% block root_section %}
            <div id="root-container" class="panel-body">
                <div id="edge-container"></div>
            </div>
        {% endblock %}
    </div>
{% endblock %}

{% block javascript %}
    {{ super() }}
    <script>
        window.APP_CONFIG = {current_lang: "{{current_i18n.language}}" }
    </script>
    {{ webpack['search_bibliographicresources.js'] }}

<script>
    window.mex = window.mex || {};
    window.mex.VOCABULARY = {{ config.get("PREF_LABELS", {}) | tojson | safe }};
    window.mex.state = mex.state || {};
    window.mex.state.lang = "{{ current_i18n.language }}"
    document.title = "MEx: Publications"
</script>

{% endblock %}
