{%- extends config.BASE_TEMPLATE %}
{% block page_body %}
<style></style>

<div id="variable-page" class="ui container search_page">
  <section class="banner">
    <small> {{ _("Search our") }}</small>
    <h1>{{ _("Variables") }}</h1>
  </section>
  {% block root_section %}
  <div id="root-container" class="panel-body ui grid">
    <div id="resources-container" class="five wide column" style="padding-left: 0"></div>
    <div id="variables-container" class="eleven wide column" style="padding-right: 0"></div>
  </div>
  {% endblock %}
</div>
{% endblock %}

{% block javascript %}
    {{ super() }}
    <script>
        window.APP_CONFIG = {current_lang: "{{current_i18n.language}}" }
    </script>
